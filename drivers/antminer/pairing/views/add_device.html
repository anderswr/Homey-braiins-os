<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Add Miner</title>
</head>
<body>
  <h1>Add Antminer (Braiins OS+)</h1>
  <p>Enter miner connection details (LAN).</p>

  <form id="f">
    <p>
      <label>Host / IP</label><br />
      <input id="host" placeholder="192.168.1.50" required />
    </p>

    <p>
      <label>Port</label><br />
      <input id="port" type="number" value="80" required />
    </p>

    <p>
      <label>Use HTTPS</label><br />
      <input id="https" type="checkbox" />
      <small>(If checked, you probably want port 443)</small>
    </p>

    <p>
      <label>Username</label><br />
      <input id="username" placeholder="root" required />
    </p>

    <p>
      <label>Password</label><br />
      <input id="password" type="password" required />
    </p>

    <button type="submit">Add</button>
  </form>

  <script>
    const form = document.getElementById('f');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const host = document.getElementById('host').value.trim();
      const port = parseInt(document.getElementById('port').value, 10);
      const https = document.getElementById('https').checked;
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const device = {
        name: `Miner ${host}`,
        data: { id: host },
        settings: { host, port, https, username, password }
      };

      Homey.emit('add_device', device);
    });

    Homey.on('continue', () => {
      Homey.showView('add_device');
    });
  </script>
</body>
</html>
